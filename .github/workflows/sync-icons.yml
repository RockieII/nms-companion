name: Sync icons

on:
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run icon sync
        run: node scripts/sync-icons.mjs

      - name: Commit changes
        run: |
          if git diff --quiet data/icon-overrides.json; then
            echo "No icon changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/icon-overrides.json
          git commit -m "chore: sync icon overrides from wiki"
          git push
